<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="#127A89"/>
  
  <!-- Rupee Symbol -->
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="80" font-weight="bold" fill="white" font-family="Arial, sans-serif">₹</text>
  
  <!-- Arrow -->
  <g transform="translate(110, 40)">
    <!-- Arrow shaft -->
    <path d="M 20 40 L 20 10" stroke="#FF7A3D" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Arrow head -->
    <path d="M 10 20 L 20 5 L 30 20" stroke="#FF7A3D" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Upward curve -->
    <path d="M 0 30 Q 20 5 40 15" stroke="#FF7A3D" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Bar Chart -->
  <g transform="translate(80, 120)">
    <rect x="0" y="15" width="10" height="15" fill="#FF7A3D"/>
    <rect x="15" y="8" width="10" height="22" fill="#FF7A3D"/>
    <rect x="30" y="0" width="10" height="30" fill="#FF7A3D"/>
  </g>
</svg>